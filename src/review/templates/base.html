<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Lincium{% endblock %}</title>
  <style>
    @font-face {
      font-family: 'Saira';
      src: url('/static/fonts/Saira.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Tema escuro (padrão) ─── */
    :root, [data-theme="dark"] {
      --laranja:        #ee702f;
      --laranja-escuro: #c55a20;
      --bg:       #090d16;
      --surface:  #0f1520;
      --surface2: #161e30;
      --border:   #253354;
      --accent:   #ee702f;
      --accent-hover: #c55a20;
      --text:     #e8edf5;
      --muted:    #7b8db0;
      --green:    #22c55e;
      --yellow:   #f59e0b;
      --red:      #ef4444;
      --font:     'Saira', system-ui, -apple-system, sans-serif;
    }

    /* ─── Tema claro ─── */
    [data-theme="light"] {
      --bg:       #f4f6fb;
      --surface:  #ffffff;
      --surface2: #eef1f7;
      --border:   #d1d9e8;
      --accent:   #ee702f;
      --accent-hover: #c55a20;
      --text:     #1a2236;
      --muted:    #6b7a99;
      --green:    #16a34a;
      --yellow:   #d97706;
      --red:      #dc2626;
      --font:     'Saira', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      transition: background .2s, color .2s;
    }

    /* ─── Header ─── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: #fff;
    }
    .logo-text { font-weight: 700; font-size: 16px; letter-spacing: .03em; }
    .logo-sub { color: var(--muted); font-size: 12px; font-weight: 400; }
    .header-meta { color: var(--muted); font-size: 13px; }
    .header-user { display: flex; align-items: center; gap: 12px; }
    .header-user-name { font-size: 13px; color: var(--muted); }

    .btn-logout, .btn-theme {
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-family: var(--font);
      font-size: 12px; cursor: pointer; text-decoration: none;
      transition: background .15s, color .15s;
    }
    .btn-logout:hover, .btn-theme:hover { background: var(--surface2); color: var(--text); }

    /* ─── Stats bar ─── */
    .stats-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      gap: 32px;
      align-items: center;
      flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .stat-value.green  { color: var(--green); }
    .stat-value.orange { color: var(--accent); }
    .stat-value.muted  { color: var(--muted); }

    .progress-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; min-width: 80px; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s ease; }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 8px; border: none;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-green { background: var(--green); color: #fff; font-weight: 700; }
    .btn-green:hover { filter: brightness(.9); }
    .btn-danger { background: var(--red); color: #fff; }

    /* ─── Inputs ─── */
    input[type="text"], select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 13px;
      outline: none;
    }
    input[type="text"]:focus, select:focus { border-color: var(--accent); }

    /* ─── Badges ─── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .badge-debit  { background: rgba(239,68,68,.15);    color: var(--red); }
    .badge-credit { background: rgba(34,197,94,.15);    color: var(--green); }
    .badge-auto   { background: rgba(238,112,47,.15);   color: var(--accent); }

    /* ─── Toast ─── */
    .toast { padding: 10px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    .toast-warn { background: rgba(238,112,47,.12); border: 1px solid var(--accent); color: var(--text); }
    .toast-info { background: rgba(91,108,255,.12); border: 1px solid #5b6cff;       color: var(--text); }

    /* ─── Main ─── */
    main { max-width: 1200px; margin: 0 auto; padding: 24px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="header">
    <div class="logo">
      <div class="logo-mark">L</div>
      <div>
        <div class="logo-text">Lincium</div>
        <div class="logo-sub">Conciliação Contábil</div>
      </div>
    </div>
    <div class="header-user">
      <div class="header-meta">{% block header_meta %}{% endblock %}</div>
      {% if user %}
      <span class="header-user-name">{{ user.name or user.email }}</span>
      {% endif %}
      <button class="btn-theme" id="theme-toggle" title="Alternar tema">🌙</button>
      {% if user %}
      <a href="/logout" class="btn-logout">Sair</a>
      {% endif %}
    </div>
  </header>
  {% block body %}{% endblock %}

  <script>
    const html = document.documentElement;
    const btn = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('lincium-theme') || 'dark';

    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      btn.textContent = theme === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('lincium-theme', theme);
    }

    applyTheme(saved);

    btn.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  </script>
</body>
</html>
