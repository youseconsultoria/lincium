{% extends "base.html" %}
{% block title %}Erro — Lincium{% endblock %}
{% block header_meta %}Erro{% endblock %}
{% block body %}
<main style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);">
  <div style="text-align:center;max-width:480px;padding:32px;">
    <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
    <h1 style="font-size:20px;font-weight:700;margin-bottom:12px;">{{ message }}</h1>
    <p style="color:var(--muted);">Rode o pipeline primeiro:<br>
    <code style="background:var(--surface2);padding:4px 8px;border-radius:4px;font-size:12px;">python run.py</code></p>
  </div>
</main>
{% endblock %}
